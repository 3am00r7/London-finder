<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's On</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #1a2332;
            --coral: #ff6b6b;
            --blue: #4ecdc4;
            --yellow: #ffe66d;
            --cream: #f7f7f2;
            --dark: #2d3436;
            --grey: #636e72;
            --light-grey: #dfe6e9;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--dark);
            line-height: 1.6;
            padding: 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 2rem 1rem 1rem;
        }

        h1 {
            font-family: 'Fraunces', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .tagline {
            color: var(--grey);
            font-size: 1rem;
        }

        .filters {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(26, 35, 50, 0.08);
        }

        .filter-group {
            margin-bottom: 1.5rem;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-label {
            display: block;
            font-weight: 500;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--navy);
            margin-bottom: 0.75rem;
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.75rem 1.25rem;
            border: 2px solid var(--light-grey);
            background: white;
            border-radius: 24px;
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--dark);
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .filter-btn:hover {
            border-color: var(--blue);
            transform: translateY(-1px);
        }

        .filter-btn.active {
            background: var(--navy);
            color: white;
            border-color: var(--navy);
        }

        .location-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid var(--light-grey);
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            transition: all 0.2s ease;
            min-height: 52px;
        }

        .location-input:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
        }

        .find-btn {
            width: 100%;
            padding: 1.25rem 2rem;
            background: linear-gradient(135deg, var(--coral) 0%, #ee5a6f 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.125rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
            min-height: 56px;
            -webkit-tap-highlight-color: transparent;
        }

        .find-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        .find-btn:disabled {
            background: var(--grey);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .results {
            display: none;
        }

        .results.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .results-title {
            font-family: 'Fraunces', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--navy);
        }

        .regenerate-btn {
            padding: 0.75rem 1.25rem;
            background: white;
            color: var(--navy);
            border: 2px solid var(--navy);
            border-radius: 24px;
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 44px;
            -webkit-tap-highlight-color: transparent;
        }

        .regenerate-btn:hover {
            background: var(--navy);
            color: white;
        }

        .regenerate-btn:active {
            transform: scale(0.98);
        }

        .cards {
            display: grid;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 12px rgba(26, 35, 50, 0.08);
            transition: all 0.3s ease;
            animation: slideUp 0.4s ease;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(26, 35, 50, 0.12);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .card-title {
            font-family: 'Fraunces', serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 0.25rem;
            flex: 1;
        }

        .favorite-btn {
            background: none;
            border: none;
            font-size: 1.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 0.5rem;
            line-height: 1;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .favorite-btn:hover {
            transform: scale(1.2);
        }

        .favorite-btn:active {
            transform: scale(0.95);
        }

        .card-type {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--blue);
            color: white;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }

        .card-description {
            color: var(--dark);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .card-details {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            padding-top: 0.75rem;
            border-top: 1px solid var(--light-grey);
        }

        .card-detail {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--grey);
            font-size: 0.875rem;
        }

        .card-detail-icon {
            font-size: 1rem;
        }

        .favorites-section {
            margin-top: 3rem;
            display: none;
        }

        .favorites-section.show {
            display: block;
        }

        .favorites-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .favorites-title {
            font-family: 'Fraunces', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--navy);
        }

        .clear-favorites-btn {
            padding: 0.5rem 1rem;
            background: none;
            color: var(--coral);
            border: none;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: underline;
            font-family: 'DM Sans', sans-serif;
        }

        .clear-favorites-btn:hover {
            color: var(--navy);
        }

        @media (max-width: 640px) {
            body {
                padding: 0.75rem;
            }

            h1 {
                font-size: 2rem;
            }

            .filters {
                padding: 1.25rem;
            }

            .filter-label {
                font-size: 0.8125rem;
            }

            .button-group {
                gap: 0.5rem;
            }

            .filter-btn {
                font-size: 0.875rem;
                padding: 0.625rem 1rem;
            }

            .card {
                padding: 1.25rem;
            }

            .card-title {
                font-size: 1.125rem;
            }

            .card-details {
                flex-direction: column;
                gap: 0.5rem;
            }

            .results-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }

            .regenerate-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>What's On</h1>
            <p class="tagline">Find something to do in London, right now</p>
        </header>

        <div class="filters">
            <div class="filter-group">
                <label class="filter-label">Budget per person</label>
                <div class="button-group">
                    <button class="filter-btn" data-filter="budget" data-value="10">£10</button>
                    <button class="filter-btn active" data-filter="budget" data-value="25">£25</button>
                    <button class="filter-btn" data-filter="budget" data-value="50">£50+</button>
                </div>
            </div>

            <div class="filter-group">
                <label class="filter-label">When</label>
                <div class="button-group">
                    <button class="filter-btn active" data-filter="time" data-value="now">Right Now</button>
                    <button class="filter-btn" data-filter="time" data-value="tonight">Tonight</button>
                    <button class="filter-btn" data-filter="time" data-value="weekend">Weekend</button>
                </div>
            </div>

            <div class="filter-group">
                <label class="filter-label">What kind</label>
                <div class="button-group">
                    <button class="filter-btn" data-filter="category" data-value="food">Food & Drink</button>
                    <button class="filter-btn" data-filter="category" data-value="activities">Activities</button>
                    <button class="filter-btn" data-filter="category" data-value="nightlife">Nightlife</button>
                    <button class="filter-btn active" data-filter="category" data-value="mix">Surprise Me</button>
                </div>
            </div>

            <div class="filter-group">
                <label class="filter-label">Vibe</label>
                <div class="button-group">
                    <button class="filter-btn" data-filter="vibe" data-value="chill">Chill</button>
                    <button class="filter-btn active" data-filter="vibe" data-value="energetic">Energetic</button>
                    <button class="filter-btn" data-filter="vibe" data-value="sophisticated">Sophisticated</button>
                    <button class="filter-btn" data-filter="vibe" data-value="casual">Casual</button>
                </div>
            </div>

            <div class="filter-group">
                <label class="filter-label">Location</label>
                <input type="text" class="location-input" id="locationInput" placeholder="e.g. Shoreditch, Camden, Soho">
            </div>
        </div>

        <button class="find-btn" id="findBtn">Find Something To Do</button>

        <div class="results" id="results">
            <div class="results-header">
                <h2 class="results-title">Here's what we found</h2>
                <button class="regenerate-btn" id="regenerateBtn">🔄 More Options</button>
            </div>
            <div class="cards" id="cards"></div>
        </div>

        <div class="favorites-section" id="favoritesSection">
            <div class="favorites-header">
                <h2 class="favorites-title">Saved Favorites</h2>
                <button class="clear-favorites-btn" id="clearFavoritesBtn">Clear All</button>
            </div>
            <div class="cards" id="favoritesCards"></div>
        </div>
    </div>

    <script>

            { name: "French House", type: "drink", category: "nightlife", area: "Soho", budget: 25, vibe: ["sophisticated", "chill"], time: ["tonight"], why: "Legendary Soho boozer. Half pints only, literary crowd, proper pub feel." },
            { name: "Swift", type: "drink", category: "nightlife", area: "Soho", budget: 25, vibe: ["sophisticated"], time: ["tonight"], why: "Two-floor cocktail bar. Upstairs is bright and Irish, downstairs is dark and serious." },

            { name: "Curzon Soho Cinema", type: "activity", category: "activities", area: "Soho", budget: 25, vibe: ["sophisticated", "chill"], time: ["tonight", "weekend"], why: "Arthouse cinema with a good bar. See something interesting, debate it after with a drink." },
            
            // CAMDEN - Food & Drink

            // HACKNEY WICK - Food & Drink

        // State management
        const state = {
            budget: '25',
            time: 'now',
            category: 'mix',
            vibe: 'energetic',
            location: '',
            lastResults: []
        };

        // DOM elements
        const filterBtns = document.querySelectorAll('.filter-btn');
        const locationInput = document.getElementById('locationInput');
        const findBtn = document.getElementById('findBtn');
        const results = document.getElementById('results');
        const cards = document.getElementById('cards');
        const regenerateBtn = document.getElementById('regenerateBtn');
        const favoritesSection = document.getElementById('favoritesSection');
        const favoritesCards = document.getElementById('favoritesCards');
        const clearFavoritesBtn = document.getElementById('clearFavoritesBtn');

        // Filter button handlers
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const filter = btn.dataset.filter;
                const value = btn.dataset.value;

                document.querySelectorAll(`[data-filter="${filter}"]`).forEach(b => {
                    b.classList.remove('active');
                });
                btn.classList.add('active');

                state[filter] = value;
            });
        });

        // Location input
        locationInput.addEventListener('input', (e) => {
            state.location = e.target.value;
        });

        // Find button
        findBtn.addEventListener('click', findSuggestions);
        regenerateBtn.addEventListener('click', findSuggestions);

        // Favorites handlers
        clearFavoritesBtn.addEventListener('click', () => {
            if (confirm('Clear all saved favorites?')) {
                localStorage.removeItem('londonFavorites');
                renderFavorites();
            }
        });

        function findSuggestions() {
            // Filter database based on criteria - more lenient approach
            let filtered = database.filter(place => {
                // Budget filter - overlapping ranges for flexibility
                if (state.budget === '10' && place.budget > 20) return false;
                if (state.budget === '25' && place.budget > 40) return false;
                // £50+ shows everything above £25
                if (state.budget === '50' && place.budget < 25) return false;

                // Category filter
                if (state.category !== 'mix' && place.category !== state.category) return false;

                // Vibe filter - any matching vibe is good
                if (!place.vibe.includes(state.vibe)) return false;

                // Time filter - any matching time is good
                if (!place.time.includes(state.time)) return false;

                return true;
            });

            // Location-based prioritization (fuzzy matching)
            if (state.location) {
                const locationLower = state.location.toLowerCase();
                filtered.sort((a, b) => {
                    const aAreaLower = a.area.toLowerCase();
                    const bAreaLower = b.area.toLowerCase();
                    
                    // Exact match gets highest priority
                    const aExact = aAreaLower === locationLower ? 2 : 0;
                    const bExact = bAreaLower === locationLower ? 2 : 0;
                    
                    // Contains match gets medium priority
                    const aContains = aAreaLower.includes(locationLower) || locationLower.includes(aAreaLower) ? 1 : 0;
                    const bContains = bAreaLower.includes(locationLower) || locationLower.includes(bAreaLower) ? 1 : 0;
                    
                    return (bExact + bContains) - (aExact + aContains);
                });
            }

            // Remove previously shown results for regenerate
            if (state.lastResults.length > 0) {
                const notShown = filtered.filter(place => 
                    !state.lastResults.some(last => last.name === place.name)
                );
                
                // If we have enough new options, use them
                if (notShown.length >= 3) {
                    filtered = notShown;
                } else {
                    // Otherwise reset history and show everything
                    state.lastResults = [];
                }
            }

            // If we filtered everything out, show a message
            if (filtered.length === 0) {
                cards.innerHTML = `
                    <div style="text-align: center; padding: 3rem; color: var(--grey);">
                        <p style="font-size: 1.125rem; margin-bottom: 0.5rem;">No matches found</p>
                        <p style="font-size: 0.875rem;">Try adjusting your filters or location</p>
                    </div>
                `;
                results.classList.add('show');
                return;
            }

            // Randomly select 5 (or fewer if not enough options)
            const selected = [];
            const count = Math.min(5, filtered.length);
            
            while (selected.length < count && filtered.length > 0) {
                const randomIndex = Math.floor(Math.random() * filtered.length);
                selected.push(filtered[randomIndex]);
                filtered.splice(randomIndex, 1);
            }

            state.lastResults = selected;
            displaySuggestions(selected);
        }

        function displaySuggestions(suggestions) {
            cards.innerHTML = '';
            
            suggestions.forEach((suggestion, index) => {
                const card = createCard(suggestion, index);
                cards.appendChild(card);
            });

            results.classList.add('show');
        }

        function createCard(suggestion, index) {
            const card = document.createElement('div');
            card.className = 'card';
            
            const isFavorite = checkIfFavorite(suggestion.name);
            
            // Map types to display names
            const typeDisplay = {
                'food': 'Food',
                'drink': 'Drink',
                'activity': 'Activity',
                'nightlife': 'Nightlife'
            };

            // Cost display
            let costDisplay = '';
            if (suggestion.budget <= 15) costDisplay = '£10-15';
            else if (suggestion.budget <= 35) costDisplay = '£20-35';
            else costDisplay = '£40+';
            
            card.innerHTML = `
                <div class="card-header">
                    <div>
                        <h3 class="card-title">${suggestion.name}</h3>
                        <span class="card-type">${typeDisplay[suggestion.type]}</span>
                    </div>
                    <button class="favorite-btn" data-name="${suggestion.name}">
                        ${isFavorite ? '❤️' : '🤍'}
                    </button>
                </div>
                <p class="card-description">${suggestion.why}</p>
                <div class="card-details">
                    <div class="card-detail">
                        <span class="card-detail-icon">💷</span>
                        <span>${costDisplay} pp</span>
                    </div>
                    <div class="card-detail">
                        <span class="card-detail-icon">📍</span>
                        <span>${suggestion.area}</span>
                    </div>
                </div>
            `;

            const favoriteBtn = card.querySelector('.favorite-btn');
            favoriteBtn.addEventListener('click', () => toggleFavorite(suggestion));

            return card;
        }

        function toggleFavorite(suggestion) {
            let favorites = JSON.parse(localStorage.getItem('londonFavorites') || '[]');
            
            const existingIndex = favorites.findIndex(f => f.name === suggestion.name);
            
            if (existingIndex >= 0) {
                favorites.splice(existingIndex, 1);
            } else {
                favorites.push(suggestion);
            }
            
            localStorage.setItem('londonFavorites', JSON.stringify(favorites));
            
            // Update all buttons with this name
            document.querySelectorAll(`[data-name="${suggestion.name}"]`).forEach(btn => {
                btn.textContent = existingIndex >= 0 ? '🤍' : '❤️';
            });
            
            renderFavorites();
        }

        function checkIfFavorite(name) {
            const favorites = JSON.parse(localStorage.getItem('londonFavorites') || '[]');
            return favorites.some(f => f.name === name);
        }

        function renderFavorites() {
            const favorites = JSON.parse(localStorage.getItem('londonFavorites') || '[]');
            
            if (favorites.length === 0) {
                favoritesSection.classList.remove('show');
                return;
            }

            favoritesCards.innerHTML = '';
            favorites.forEach((fav, index) => {
                const card = createCard(fav, `fav-${index}`);
                favoritesCards.appendChild(card);
            });

            favoritesSection.classList.add('show');
        }

        // Load favorites on page load
        renderFavorites();
    </script>
</body>
</html>
